[env:pic16f877]
platform = pic8bit
board = pic16f877
framework = pic-xc8
build_flags = -mdfp=/opt/microchip/mplabx/v6.00/packs/Microchip/PIC16Fxxx_DFP/1.3.42/xc8
              -Iinclude
              -I.pio/libdeps/pic16f877/HAL_Arduino_PIC8/include
lib_deps =
    https://github.com/Fo170/HAL_Arduino_PIC8.git@^1.0.2@^1.0.2

[env:pic18f4550]
platform = pic8bit
board = pic18f4550
framework = pic-xc8
build_flags = -mdfp=/opt/microchip/mplabx/v6.00/packs/Microchip/PIC18Fxxxx_DFP/1.3.36/xc8
              -Iinclude
              -I.pio/libdeps/pic18f4550/HAL_Arduino_PIC8/include
lib_deps =
    https://github.com/Fo170/HAL_Arduino_PIC8.git@^1.0.2
